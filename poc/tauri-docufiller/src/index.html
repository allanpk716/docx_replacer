<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocuFiller PoC</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        h1 { color: #1a73e8; }
        #status { padding: 12px; border-radius: 6px; background: #f0f0f0; margin: 16px 0; }
        #greet-result { margin-top: 12px; font-weight: bold; }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: #1a73e8;
            color: white;
            cursor: pointer;
            font-size: 14px;
            margin-right: 8px;
        }
        button:hover { background: #1557b0; }
        #health-result { margin-top: 12px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>DocuFiller PoC — Tauri v2 + .NET Sidecar</h1>
    <p>This project validates the Tauri + .NET sidecar integration pattern.</p>

    <div id="status">Loading...</div>

    <div>
        <button id="greet-btn">Test Greet Command</button>
        <button id="health-btn">Check Sidecar Health</button>
    </div>
    <div id="greet-result"></div>
    <div id="health-result"></div>

    <script>
        const statusEl = document.getElementById('status');
        const greetResult = document.getElementById('greet-result');
        const healthResult = document.getElementById('health-result');

        // Verify Tauri is loaded
        if (window.__TAURI__) {
            statusEl.textContent = '✅ Tauri runtime loaded successfully';
            statusEl.style.background = '#d4edda';
        } else {
            statusEl.textContent = '❌ Tauri runtime not detected (running in browser?)';
            statusEl.style.background = '#f8d7da';
        }

        document.getElementById('greet-btn').addEventListener('click', async () => {
            greetResult.textContent = 'Calling greet...';
            try {
                const { invoke } = window.__TAURI__.core;
                const result = await invoke('greet', { name: 'World' });
                greetResult.textContent = '✅ ' + result;
            } catch (e) {
                greetResult.textContent = '❌ Error: ' + e;
            }
        });

        // Sidecar health check via fetch (CSP allows connect-src to localhost:5000)
        document.getElementById('health-btn').addEventListener('click', async () => {
            healthResult.textContent = 'Checking sidecar at http://localhost:5000/api/health ...';
            try {
                const resp = await fetch('http://localhost:5000/api/health');
                const data = await resp.json();
                healthResult.textContent = '✅ Sidecar healthy: ' + JSON.stringify(data, null, 2);
            } catch (e) {
                healthResult.textContent = '❌ Sidecar unreachable: ' + e.message +
                    '\n(Make sure to start the .NET sidecar first: cd sidecar-dotnet && dotnet run)';
            }
        });
    </script>
</body>
</html>
