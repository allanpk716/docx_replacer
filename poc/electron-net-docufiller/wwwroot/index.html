<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocuFiller Electron.NET PoC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #e94560, #533483);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1rem;
            color: #8899aa;
            margin-bottom: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            color: white;
            background: linear-gradient(90deg, #e94560, #533483);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(233,69,96,0.3); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        #status { margin-top: 1rem; font-size: 0.9rem; color: #8899aa; min-height: 1.5em; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 1rem;
            overflow: hidden;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #533483);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .tech-info {
            font-size: 0.8rem;
            color: #556677;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DocuFiller PoC</h1>
        <p class="subtitle">Electron.NET + ASP.NET Core 技术验证</p>

        <div class="card">
            <button class="btn" id="selectBtn" onclick="selectFile()">选择文档</button>
            <div id="status">就绪</div>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="tech-info">
            Electron.NET PoC | ASP.NET Core 8 | IPC Bridge Test
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const selectBtn = document.getElementById('selectBtn');

        async function selectFile() {
            selectBtn.disabled = true;
            statusEl.textContent = '正在打开文件对话框...';
            try {
                const resp = await fetch('/api/select-file');
                const data = await resp.json();
                if (data.path) {
                    statusEl.textContent = '已选择: ' + data.path;
                    simulateProcessing(data.path);
                } else {
                    statusEl.textContent = data.message || '未选择文件';
                    selectBtn.disabled = false;
                }
            } catch (err) {
                statusEl.textContent = '错误: ' + err.message;
                selectBtn.disabled = false;
            }
        }

        function simulateProcessing(filename) {
            progressBar.style.display = 'block';
            statusEl.textContent = '正在处理: ' + filename;
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    statusEl.textContent = '处理完成! (模拟)';
                    selectBtn.disabled = false;
                }
                progressFill.style.width = progress + '%';
            }, 200);
        }
    </script>
</body>
</html>
